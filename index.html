<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student LifeOS</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="/icon.jpeg" type="image/x-icon">
    <!--google login things-->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js"></script>
    <!--fonts-->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Indie+Flower&display=swap" rel="stylesheet" />

</head>
<body>
    <!--bootscreen-->
    <div id="details">
        <h1>Student LifeOS</h1>
        <h2>All your apps in one place</h2>
        <button id="login-button">Log in</button>
    </div>
    <div id="entering" style="display: none;">
        <pre id="entering-text" class="entering-text" aria-live="polite"></pre>
    </div>
    <div id="googleAuth" style="display: none;"></div>
    <div id="boot-screen" style="display: none;">
        <pre id="boot-text" class="boot-text" aria-live="polite"></pre>
    </div>
    
    <!--<footer>
        <p>&copy; 2026 Student LifeOS</p>
    </footer>-->
    <script type="module" src="app.js"></script>

</html>
